[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200

remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
]

[rpc_endpoints]
ritual = "https://rpc.ritualfoundation.org"

[etherscan]
ritual = { key = "placeholder", url = "https://explorer.ritualfoundation.org/api" }
